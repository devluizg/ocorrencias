<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocorrencias Escolar</title>
    <meta name="theme-color" content="#0040a1">
    <meta name="description" content="Sistema de registro de ocorrências escolares">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0040a1',
                        'primary-container': '#0056d2',
                        'on-primary': '#ffffff',
                        'surface': '#f8f9fa',
                        'surface-container': '#edeeef',
                        'surface-container-low': '#f3f4f5',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-high': '#e7e8e9',
                        'surface-container-highest': '#e1e3e4',
                        'on-surface': '#191c1d',
                        'on-surface-variant': '#424654',
                        'outline': '#737785',
                        'secondary': '#506073',
                        'secondary-container': '#d0e1f8',
                        'tertiary': '#940010',
                        'tertiary-container': '#ba1b20',
                        'error': '#ba1a1a',
                        'surface-dim': '#d9dadb',
                        'inverse-surface': '#2e3132',
                        'surface-tint': '#0056d2',
                    },
                    fontFamily: {
                        headline: ['Manrope'],
                        body: ['Public Sans'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            min-height: 100dvh;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .severity-radio:checked + label {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0, 64, 161, 0.12);
        }
        .type-btn.active {
            background: linear-gradient(135deg, #dae2ff 0%, #b2c5ff 100%);
            color: #0040a1;
        }
        .tab-active {
            background: linear-gradient(180deg, rgba(0,64,161,0.08) 0%, rgba(0,64,161,0.04) 100%);
            color: #0040a1;
        }
        .tab-active .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-surface-container text-on-surface min-h-screen pb-32">

    <!-- TopAppBar -->
    <header class="bg-white/85 backdrop-blur-md fixed top-0 w-full z-50 border-b border-surface-container-high">
        <div class="flex justify-between items-center px-4 h-16 max-w-md mx-auto">
            <button class="text-primary p-2 rounded-full hover:bg-surface-container-low transition-all" onclick="toggleMenu()">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <h1 class="text-lg font-bold tracking-tight text-primary">Ocorrências Escolar</h1>
            <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center">
                <span class="material-symbols-outlined text-on-surface-variant">school</span>
            </div>
        </div>
    </header>

    <main class="pt-20 px-4 max-w-md mx-auto">

        <!-- ABA NOVA OCORRÊNCIA -->
        <section id="nova" class="tab-content active">
            <div class="mb-6 mt-2">
                <h2 class="text-2xl font-extrabold text-primary tracking-tight">Nova Ocorrência</h2>
                <p class="text-on-surface-variant text-sm mt-1">Registre incidentes com agilidade.</p>
            </div>

            <form id="occurrence-form" class="space-y-5">
                <!-- Student & Class -->
                <div class="bg-surface-container-lowest rounded-2xl p-5 shadow-sm space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-outline mb-2">Estudante</label>
                        <div class="relative">
                            <input id="student-name" required type="text" 
                                class="w-full h-12 bg-surface-container-highest rounded-xl px-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-low transition-all"
                                placeholder="Digite o nome do aluno...">
                            <span class="material-symbols-outlined absolute right-3 top-3 text-outline">search</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-outline mb-2">Série / Turma</label>
                        <select id="class" required
                            class="w-full h-12 bg-surface-container-highest rounded-xl px-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-low transition-all appearance-none">
                            <option value="">Selecione a turma</option>
                            <option value="1º Ano A">1º Ano A</option>
                            <option value="1º Ano B">1º Ano B</option>
                            <option value="2º Ano A">2º Ano A</option>
                            <option value="2º Ano B">2º Ano B</option>
                            <option value="3º Ano A">3º Ano A</option>
                            <option value="3º Ano B">3º Ano B</option>
                            <option value="4º Ano A">4º Ano A</option>
                            <option value="4º Ano B">4º Ano B</option>
                            <option value="5º Ano A">5º Ano A</option>
                            <option value="5º Ano B">5º Ano B</option>
                            <option value="6º Ano A">6º Ano A</option>
                            <option value="6º Ano B">6º Ano B</option>
                            <option value="7º Ano A">7º Ano A</option>
                            <option value="7º Ano B">7º Ano B</option>
                            <option value="8º Ano A">8º Ano A</option>
                            <option value="8º Ano B">8º Ano B</option>
                            <option value="9º Ano A">9º Ano A</option>
                            <option value="9º Ano B">9º Ano B</option>
                            <option value="1ª Série">1ª Série</option>
                            <option value="2ª Série">2ª Série</option>
                            <option value="3ª Série">3ª Série</option>
                        </select>
                    </div>
                </div>

                <!-- Severity -->
                <div class="space-y-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-outline">Nível de Gravidade</label>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="relative">
                            <input checked class="hidden severity-radio" id="sev-leve" name="severity" type="radio" value="Leve">
                            <label class="flex flex-col items-center justify-center p-3 rounded-xl bg-surface-container-lowest border-l-4 border-secondary-container cursor-pointer transition-all hover:bg-surface-container-low" for="sev-leve">
                                <span class="material-symbols-outlined text-primary mb-1">info</span>
                                <span class="text-xs font-bold text-primary">Leve</span>
                            </label>
                        </div>
                        <div class="relative">
                            <input class="hidden severity-radio" id="sev-medio" name="severity" type="radio" value="Médio">
                            <label class="flex flex-col items-center justify-center p-3 rounded-xl bg-surface-container-lowest border-l-4 border-primary-container cursor-pointer transition-all hover:bg-surface-container-low" for="sev-medio">
                                <span class="material-symbols-outlined text-primary-container mb-1">priority_high</span>
                                <span class="text-xs font-bold text-primary">Médio</span>
                            </label>
                        </div>
                        <div class="relative">
                            <input class="hidden severity-radio" id="sev-grave" name="severity" type="radio" value="Grave">
                            <label class="flex flex-col items-center justify-center p-3 rounded-xl bg-surface-container-lowest border-l-4 border-tertiary cursor-pointer transition-all hover:bg-surface-container-low" for="sev-grave">
                                <span class="material-symbols-outlined text-tertiary mb-1">warning</span>
                                <span class="text-xs font-bold text-tertiary">Grave</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Type -->
                <div class="space-y-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-outline">Tipo de Ocorrência</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Atraso">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">schedule</span>
                            <span class="text-xs font-semibold">Atraso</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Falta">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">event_busy</span>
                            <span class="text-xs font-semibold">Falta</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Falta de material">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">inventory_2</span>
                            <span class="text-xs font-semibold">Falta Material</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Não realizou tarefa">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">assignment</span>
                            <span class="text-xs font-semibold">Não fez tarefa</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Conversa excessiva">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">chat</span>
                            <span class="text-xs font-semibold">Conversa</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Brigas/Conflito">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">groups</span>
                            <span class="text-xs font-semibold">Brigas</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Bullying/Assédio">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">back_hand</span>
                            <span class="text-xs font-semibold">Bullying</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Uso de celular">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">smartphone</span>
                            <span class="text-xs font-semibold">Celular</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Descumprimento de regras">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">gavel</span>
                            <span class="text-xs font-semibold">Desrespeito</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Agressão verbal">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">record_voice_over</span>
                            <span class="text-xs font-semibold">Agressão Verbal</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Agressão física">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">person_off</span>
                            <span class="text-xs font-semibold">Agressão Física</span>
                        </button>
                        <button type="button" class="type-btn flex items-center gap-2 p-3 rounded-xl bg-surface-container-lowest text-left hover:bg-surface-container-high transition-colors" data-type="Outro">
                            <span class="material-symbols-outlined text-sm text-on-surface-variant">more_horiz</span>
                            <span class="text-xs font-semibold">Outro</span>
                        </button>
                    </div>
                    <input type="hidden" id="type" required>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-outline mb-2">Descrição (Opcional)</label>
                    <textarea id="description" rows="3" 
                        class="w-full bg-surface-container-lowest rounded-xl p-4 text-on-surface focus:ring-2 focus:ring-primary transition-all shadow-sm"
                        placeholder="Descreva o ocorrido com clareza..."></textarea>
                </div>

                <!-- Responsible -->
                <div class="flex items-center gap-3 p-4 bg-surface-container-high/40 rounded-2xl">
                    <span class="material-symbols-outlined text-outline">account_circle</span>
                    <div class="flex flex-col flex-1">
                        <span class="text-[10px] uppercase font-bold text-outline">Professor Responsável</span>
                        <input id="teacher" required type="text" 
                            class="bg-transparent text-sm font-semibold text-on-surface focus:outline-none"
                            placeholder="Seu nome">
                    </div>
                </div>

                <!-- Action -->
                <button type="submit" class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-white rounded-2xl font-bold shadow-lg hover:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">save</span>
                    Salvar Ocorrência
                </button>
                <button type="button" id="clear-form" class="w-full h-12 bg-surface-container-lowest text-on-surface-variant rounded-2xl font-semibold hover:bg-surface-container-high transition-colors">
                    Limpar Formulário
                </button>
            </form>
        </section>

        <!-- ABA OCORRÊNCIAS -->
        <section id="ocorrencias" class="tab-content">
            <div class="mb-6 mt-2">
                <h2 class="text-2xl font-extrabold text-primary tracking-tight">Todas as Ocorrências</h2>
            </div>

            <!-- Filtros -->
            <div class="bg-surface-container-lowest rounded-2xl p-4 space-y-3 mb-4">
                <div class="grid grid-cols-2 gap-2">
                    <select id="filter-class" class="h-10 bg-surface-container-highest rounded-lg px-3 text-sm focus:ring-2 focus:ring-primary">
                        <option value="">Todas as turmas</option>
                        <option value="1º Ano A">1º Ano A</option>
                        <option value="1º Ano B">1º Ano B</option>
                        <option value="2º Ano A">2º Ano A</option>
                        <option value="2º Ano B">2º Ano B</option>
                        <option value="3º Ano A">3º Ano A</option>
                        <option value="3º Ano B">3º Ano B</option>
                        <option value="4º Ano A">4º Ano A</option>
                        <option value="4º Ano B">4º Ano B</option>
                        <option value="5º Ano A">5º Ano A</option>
                        <option value="5º Ano B">5º Ano B</option>
                        <option value="6º Ano A">6º Ano A</option>
                        <option value="6º Ano B">6º Ano B</option>
                        <option value="7º Ano A">7º Ano A</option>
                        <option value="7º Ano B">7º Ano B</option>
                        <option value="8º Ano A">8º Ano A</option>
                        <option value="8º Ano B">8º Ano B</option>
                        <option value="9º Ano A">9º Ano A</option>
                        <option value="9º Ano B">9º Ano B</option>
                        <option value="1ª Série">1ª Série</option>
                        <option value="2ª Série">2ª Série</option>
                        <option value="3ª Série">3ª Série</option>
                    </select>
                    <select id="filter-gravity" class="h-10 bg-surface-container-highest rounded-lg px-3 text-sm focus:ring-2 focus:ring-primary">
                        <option value="">Todas as gravidades</option>
                        <option value="Leve">Leve</option>
                        <option value="Médio">Médio</option>
                        <option value="Grave">Grave</option>
                    </select>
                </div>
                <input type="text" id="filter-student" placeholder="Buscar aluno..." 
                    class="h-10 bg-surface-container-highest rounded-lg px-3 text-sm focus:ring-2 focus:ring-primary w-full">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="filter-date-start" class="h-10 bg-surface-container-highest rounded-lg px-3 text-sm">
                    <input type="date" id="filter-date-end" class="h-10 bg-surface-container-highest rounded-lg px-3 text-sm">
                </div>
            </div>

            <div id="occurrence-list" class="space-y-3"></div>
        </section>

        <!-- ABA RELATÓRIOS -->
        <section id="relatorios" class="tab-content">
            <div class="mb-6 mt-2">
                <h2 class="text-2xl font-extrabold text-primary tracking-tight">Relatórios</h2>
            </div>

            <div class="bg-surface-container-lowest rounded-2xl p-4">
                <label class="block text-xs font-bold uppercase tracking-wider text-outline mb-2">Buscar Aluno</label>
                <input type="text" id="search-student" placeholder="Digite o nome do aluno..."
                    class="w-full h-12 bg-surface-container-highest rounded-xl px-4 text-on-surface focus:ring-2 focus:ring-primary">
            </div>

            <div id="student-report" class="space-y-4 mt-4"></div>
        </section>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-5 pt-2 bg-white/85 backdrop-blur-md border-t border-surface-container-high z-50">
        <button class="tab-btn tab-active flex flex-col items-center justify-center px-4 py-2 rounded-xl transition-all" data-tab="nova">
            <span class="material-symbols-outlined">add_circle</span>
            <span class="text-[10px] font-semibold">Nova</span>
        </button>
        <button class="tab-btn flex flex-col items-center justify-center px-4 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container-low transition-all" data-tab="ocorrencias">
            <span class="material-symbols-outlined">format_list_bulleted</span>
            <span class="text-[10px] font-semibold">Ocorrências</span>
        </button>
        <button class="tab-btn flex flex-col items-center justify-center px-4 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container-low transition-all" data-tab="relatorios">
            <span class="material-symbols-outlined">analytics</span>
            <span class="text-[10px] font-semibold">Relatórios</span>
        </button>
    </nav>

    <!-- Modal -->
    <div id="student-modal" class="modal hidden">
        <div class="bg-surface-container-lowest rounded-2xl p-5 w-full max-w-sm mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-on-surface">Relatório do Aluno</h3>
                <button id="close-modal" class="p-1 rounded-full hover:bg-surface-container-high">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-on-surface text-surface-container px-5 py-3 rounded-full font-medium shadow-lg hidden z-50">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let dbClient = null;
        let occurrences = [];
        const STORAGE_KEY = 'ocorrencias_escolar';

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('text-on-surface-variant'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    btn.classList.add('tab-active');
                    btn.classList.remove('text-on-surface-variant');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });
        }

        function toggleMenu() {
            showToast('Menu em breve!');
        }

        async function loadConfig() {
            try {
                const response = await fetch('js/config.js');
                if (!response.ok) throw new Error('Config not found');
                const script = document.createElement('script');
                script.text = await response.text();
                document.head.appendChild(script);
                return true;
            } catch (e) {
                console.log('Modo localStorage');
                return false;
            }
        }

        async function loadOccurrences() {
            if (dbClient) {
                const { data, error } = await dbClient.from('occurrences').select('*').order('created_at', { ascending: false });
                if (error) {
                    const local = localStorage.getItem(STORAGE_KEY);
                    occurrences = local ? JSON.parse(local) : [];
                } else {
                    occurrences = data.map(o => ({
                        id: o.id, studentName: o.student_name, class: o.class, type: o.type,
                        gravity: o.gravity, description: o.description, teacher: o.teacher, date: o.created_at
                    }));
                }
            } else {
                const local = localStorage.getItem(STORAGE_KEY);
                occurrences = local ? JSON.parse(local) : [];
            }
            renderOccurrences();
        }

        async function saveOccurrence(occurrence) {
            if (dbClient) {
                const { error } = await dbClient.from('occurrences').insert([{
                    student_name: occurrence.studentName, class: occurrence.class, type: occurrence.type,
                    gravity: occurrence.gravity, description: occurrence.description || null, teacher: occurrence.teacher
                }]);
                if (error) { showToast('Erro ao salvar!'); return false; }
            } else {
                occurrence.id = Date.now();
                occurrence.date = new Date().toISOString();
                occurrences.unshift(occurrence);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(occurrences));
            }
            return true;
        }

        function setupForm() {
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('type').value = btn.dataset.type;
                });
            });

            const form = document.getElementById('occurrence-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = form.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Salvando...';
                
                const severity = document.querySelector('input[name="severity"]:checked').value;
                
                const occurrence = {
                    studentName: document.getElementById('student-name').value.trim(),
                    class: document.getElementById('class').value,
                    type: document.getElementById('type').value || 'Outro',
                    gravity: severity,
                    description: document.getElementById('description').value.trim(),
                    teacher: document.getElementById('teacher').value.trim()
                };
                
                const success = await saveOccurrence(occurrence);
                if (success) {
                    showToast('Ocorrência salva com sucesso!');
                    form.reset();
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                    loadOccurrences();
                }
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined">save</span> Salvar Ocorrência';
            });

            document.getElementById('clear-form').addEventListener('click', () => {
                form.reset();
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            });
        }

        function setupFilters() {
            ['filter-class', 'filter-gravity', 'filter-student', 'filter-date-start', 'filter-date-end'].forEach(id => {
                document.getElementById(id).addEventListener('input', renderOccurrences);
            });
        }

        function getFilteredOccurrences() {
            const fClass = document.getElementById('filter-class').value;
            const fGravity = document.getElementById('filter-gravity').value;
            const fStudent = document.getElementById('filter-student').value.toLowerCase();
            const fDateStart = document.getElementById('filter-date-start').value;
            const fDateEnd = document.getElementById('filter-date-end').value;

            return occurrences.filter(o => {
                if (fClass && o.class !== fClass) return false;
                if (fGravity && o.gravity !== fGravity) return false;
                if (fStudent && !o.studentName.toLowerCase().includes(fStudent)) return false;
                if (fDateStart && o.date < fDateStart) return false;
                if (fDateEnd && o.date > fDateEnd + 'T23:59:59') return false;
                return true;
            });
        }

        function renderOccurrences() {
            const list = document.getElementById('occurrence-list');
            const filtered = getFilteredOccurrences();

            if (filtered.length === 0) {
                list.innerHTML = '<div class="text-center py-8 text-on-surface-variant"><span class="material-symbols-outlined text-4xl mb-2">inbox</span><p>Nenhuma ocorrência encontrada</p></div>';
                return;
            }

            const gravityColors = {
                'Leve': 'bg-secondary-container text-secondary',
                'Médio': 'bg-primary-container text-primary',
                'Grave': 'bg-tertiary-container text-tertiary'
            };

            list.innerHTML = filtered.map(o => `
                <div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm" onclick="toggleDetails(this)">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="font-bold text-on-surface">${o.studentName}</span>
                            <span class="text-xs text-on-surface-variant ml-2">${o.class}</span>
                        </div>
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${gravityColors[o.gravity]}">${o.gravity}</span>
                    </div>
                    <div class="flex items-center gap-2 text-on-surface-variant text-sm">
                        <span class="material-symbols-outlined text-base">label</span>
                        <span>${o.type}</span>
                    </div>
                    <div class="text-xs text-outline mt-1">${formatDate(o.date)}</div>
                    <div class="hidden mt-3 pt-3 border-t border-surface-container-high details-content">
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div><span class="text-outline">Professor:</span> <span class="font-medium">${o.teacher}</span></div>
                            ${o.description ? `<div class="col-span-2"><span class="text-outline">Descrição:</span> <span>${o.description}</span></div>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleDetails(el) {
            el.querySelector('.details-content').classList.toggle('hidden');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function setupModal() {
            document.getElementById('close-modal').addEventListener('click', () => {
                document.getElementById('student-modal').classList.add('hidden');
            });

            document.getElementById('search-student').addEventListener('input', (e) => {
                const name = e.target.value.trim().toLowerCase();
                if (name.length < 2) {
                    document.getElementById('student-report').innerHTML = '';
                    return;
                }
                const studentOccurrences = occurrences.filter(o => o.studentName.toLowerCase().includes(name));
                renderStudentReport(studentOccurrences, name);
            });
        }

        function renderStudentReport(studentOccurrences, searchName) {
            const container = document.getElementById('student-report');
            if (studentOccurrences.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-on-surface-variant"><p>Nenhum aluno encontrado com "${searchName}"</p></div>';
                return;
            }

            const counts = { Leve: 0, Médio: 0, Grave: 0 };
            studentOccurrences.forEach(o => counts[o.gravity]++);

            const grouped = {};
            studentOccurrences.forEach(o => {
                const key = o.studentName.toLowerCase();
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(o);
            });

            container.innerHTML = Object.entries(grouped).map(([name, items]) => `
                <div class="bg-surface-container-lowest rounded-2xl p-5 shadow-sm">
                    <h3 class="text-lg font-bold text-on-surface">${items[0].studentName}</h3>
                    <p class="text-on-surface-variant text-sm mb-4">${items[0].class}</p>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div class="bg-secondary-container/50 rounded-xl p-3 text-center">
                            <span class="text-2xl font-bold text-secondary block">${counts.Leve}</span>
                            <span class="text-xs text-secondary">Leve</span>
                        </div>
                        <div class="bg-primary-container/50 rounded-xl p-3 text-center">
                            <span class="text-2xl font-bold text-primary block">${counts.Médio}</span>
                            <span class="text-xs text-primary">Médio</span>
                        </div>
                        <div class="bg-tertiary-container/50 rounded-xl p-3 text-center">
                            <span class="text-2xl font-bold text-tertiary block">${counts.Grave}</span>
                            <span class="text-xs text-tertiary">Grave</span>
                        </div>
                    </div>
                    <div class="space-y-2 relative pl-4 border-l-2 border-surface-container-high">
                        ${items.map(o => `
                            <div class="relative">
                                <div class="absolute -left-5 top-2 w-2 h-2 rounded-full ${o.gravity === 'Grave' ? 'bg-tertiary' : o.gravity === 'Médio' ? 'bg-primary' : 'bg-secondary'}"></div>
                                <div class="bg-surface-container-low rounded-lg p-3">
                                    <div class="flex justify-between items-center">
                                        <span class="font-medium">${o.type}</span>
                                        <span class="text-xs text-outline">${formatDate(o.date)}</span>
                                    </div>
                                    <div class="text-xs text-outline mt-1">${o.teacher}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function init() {
            await loadConfig();
            if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_KEY !== 'undefined') {
                dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
            setupTabs();
            setupForm();
            setupFilters();
            setupModal();
            loadOccurrences();
        }

        document.addEventListener('DOMContentLoaded', init);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
